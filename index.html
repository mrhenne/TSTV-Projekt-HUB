                                                    </table>
                                                </div>
                                                <div className="flex items-center gap-4 mt-6 pt-6 border-t border-slate-300/50 dark:border-white/10">
                                                    <input value={newSpecKey} onChange={(e) => setNewSpecKey(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && addSpecRow()} placeholder="Neue Eigenschaft (z.B. Ladezeit)..." className="flex-1 bg-white/60 dark:bg-black/30 border border-slate-300/50 dark:border-white/20 rounded-xl p-4 text-sm outline-none focus:border-cyanAccent shadow-inner" />
                                                    <button onClick={addSpecRow} className="bg-white/50 dark:bg-white/10 hover:bg-cyanAccent/20 border border-slate-300/50 dark:border-white/20 hover:border-cyanAccent/50 text-slate-800 dark:text-white px-6 py-4 rounded-xl text-sm font-bold flex items-center gap-2 transition-all">
                                                        <IconPlus /> Eigenschaft anlegen
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </>
                        ) : (
                            /* ── PROJECT DASHBOARD (empty state) ── */
                            <div className="flex-1 overflow-auto p-8 animate-fade-in">
                                <div className="max-w-5xl mx-auto">
                                    {/* Header */}
                                    <div className="flex items-end justify-between mb-10">
                                        <div>
                                            <p className="text-xs font-bold uppercase tracking-widest text-brandOrange mb-2">Übersicht</p>
                                            <h1 className="text-4xl font-black text-slate-800 dark:text-white">Deine Projekte</h1>
                                        </div>
                                        <button
                                            onClick={() => { setIsCreatingCategory(false); setShowNewProjectModal(true); }}
                                            className="flex items-center gap-2 bg-brandOrange text-white px-6 py-3 rounded-xl font-bold shadow-[0_4px_20px_rgba(255,123,0,0.4)] hover:shadow-[0_4px_30px_rgba(255,123,0,0.6)] hover:scale-105 active:scale-95 transition-all"
                                        >
                                            <IconPlus /> Neues Projekt
                                        </button>
                                    </div>

                                    {projects.length === 0 ? (
                                        <div className="glass-panel rounded-3xl p-20 text-center">
                                            <div className="text-6xl mb-6">📦</div>
                                            <h2 className="text-2xl font-bold text-slate-700 dark:text-white/70 mb-3">Noch keine Projekte</h2>
                                            <p className="text-slate-500 dark:text-white/40">Klick auf 'Neues Projekt' um loszulegen.</p>
                                        </div>
                                    ) : (
                                        <>
                                            {/* Stats row */}
                                            {(() => {
                                                const active = projects.filter(p => p.status !== 'done').length;
                                                const done = projects.filter(p => p.status === 'done').length;
                                                const totalSecs = projects.reduce((s, p) => s + (p.timeSpent || 0), 0);
                                                return (
                                                    <div className="grid grid-cols-3 gap-4 mb-8">
                                                        {[
                                                            { label: 'Aktive Tests', value: active, color: 'text-cyanAccent', bg: 'bg-cyanAccent/10 border-cyanAccent/20' },
                                                            { label: 'Abgeschlossen', value: done, color: 'text-green-500', bg: 'bg-green-500/10 border-green-500/20' },
                                                            { label: 'Gesamt-Testzeit', value: formatTime(totalSecs), color: 'text-brandOrange', bg: 'bg-brandOrange/10 border-brandOrange/20' },
                                                        ].map(s => (
                                                            <div key={s.label} className={`glass-panel rounded-2xl p-5 border ${s.bg}`}>
                                                                <div className={`text-3xl font-black ${s.color} mb-1`}>{s.value}</div>
                                                                <div className="text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-white/40">{s.label}</div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                );
                                            })()}

                                            {/* Project cards */}
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                                {projects.map(p => {
                                                    // Calculate progress for this project
                                                    let t = 0, c = 0;
                                                    [...(p.checklist || []), ...(p.shotlist || [])].forEach(phase => {
                                                        t += phase.items.length;
                                                        c += phase.items.filter(i => i.done).length;
                                                    });
                                                    const pct = t === 0 ? 0 : Math.round((c / t) * 100);
                                                    const score = (() => {
                                                        const vals = Object.values(p.scores || {});
                                                        return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : '—';
                                                    })();
                                                    const catName = categories.find(cc => cc.id === p.category)?.name || p.category;
                                                    const isDone = p.status === 'done';

                                                    // SVG ring progress
                                                    const r = 22, circ = 2 * Math.PI * r;
                                                    const dash = (pct / 100) * circ;

                                                    return (
                                                        <div
                                                            key={p.id}
                                                            onClick={() => switchProject(p.id)}
                                                            className={`glass-panel rounded-2xl p-6 cursor-pointer hover:scale-[1.02] active:scale-[0.99] transition-all duration-200 group border ${isDone ? 'border-green-500/30 opacity-75' : 'border-slate-300/50 dark:border-white/10 hover:border-brandOrange/40'}`}
                                                        >
                                                            <div className="flex items-start justify-between mb-5">
                                                                <div className="flex-1 overflow-hidden pr-4">
                                                                    <div className="flex items-center gap-2 mb-1">
                                                                        <span className="text-[10px] font-bold uppercase tracking-widest text-brandOrange">{catName}</span>
                                                                        {isDone && <span className="text-[10px] font-bold uppercase tracking-wider text-green-500 bg-green-500/10 px-2 py-0.5 rounded-full">Fertig</span>}
                                                                    </div>
                                                                    <h3 className="text-lg font-black text-slate-800 dark:text-white truncate group-hover:text-brandOrange transition-colors">{p.title}</h3>
                                                                    <div className="flex items-center gap-3 mt-1 text-xs text-slate-500 dark:text-white/40">
                                                                        <span className="flex items-center gap-1"><IconClock /> {formatTime(p.timeSpent)}</span>
                                                                        <span>·</span>
                                                                        <span>{c}/{t} Punkte</span>
                                                                    </div>
                                                                </div>

                                                                {/* Circular progress ring */}
                                                                <div className="relative shrink-0 w-14 h-14">
                                                                    <svg width="56" height="56" viewBox="0 0 56 56">
                                                                        <circle cx="28" cy="28" r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="4"/>
                                                                        <circle
                                                                            cx="28" cy="28" r={r} fill="none"
                                                                            stroke={isDone ? '#22c55e' : '#FF7B00'}
                                                                            strokeWidth="4"
                                                                            strokeLinecap="round"
                                                                            strokeDasharray={`${dash} ${circ}`}
                                                                            transform="rotate(-90 28 28)"
                                                                            style={{ transition: 'stroke-dasharray 0.6s ease' }}
                                                                        />
                                                                    </svg>
                                                                    <div className="absolute inset-0 flex items-center justify-center">
                                                                        <span className="text-xs font-black text-slate-700 dark:text-white">{pct}%</span>
                                                                    </div>
                                                                </div>
                                                            </div>

                                                            {/* Progress bar */}
                                                            <div className="w-full h-1.5 bg-slate-200 dark:bg-white/10 rounded-full overflow-hidden mb-4">
                                                                <div
                                                                    className={`h-full rounded-full transition-all duration-700 ${isDone ? 'bg-green-500' : 'bg-gradient-to-r from-cyanAccent to-brandOrange'}`}
                                                                    style={{ width: `${pct}%` }}
                                                                />
                                                            </div>

                                                            {/* Score badges */}
                                                            <div className="flex items-center justify-between">
                                                                <div className="flex gap-2 flex-wrap">
                                                                    {Object.entries(p.scores || {}).slice(0, 3).map(([k, v]) => (
                                                                        <span key={k} className="text-[10px] bg-white/50 dark:bg-white/10 border border-slate-200 dark:border-white/10 px-2 py-1 rounded-lg font-mono text-slate-600 dark:text-white/60">
                                                                            {k.replace(/_/g, ' ')}: <strong className="text-slate-800 dark:text-white">{v}</strong>
                                                                        </span>
                                                                    ))}
                                                                </div>
                                                                <div className="bg-slate-100 dark:bg-white/10 px-3 py-1.5 rounded-xl flex items-center gap-1.5">
                                                                    <span className="text-[10px] text-slate-500 dark:text-white/50 uppercase font-bold">Ø</span>
                                                                    <span className="font-black text-slate-800 dark:text-white text-lg leading-none">{score}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* FOCUS / LAB MODE */}
                    {isFocusModeOpen && currentProject && (
                        <div className="fixed inset-0 z-[100] bg-slate-900 dark:bg-black text-white flex flex-col animate-fade-in overflow-hidden">
                            <div className="p-6 flex justify-between items-center border-b border-white/10 shrink-0">
                                <div className="flex items-center gap-4">
                                    <div className="bg-brandOrange text-black px-4 py-1.5 rounded-lg font-black tracking-widest uppercase flex items-center gap-2">
                                        <IconTarget /> Labor Modus
                                    </div>
                                    <h2 className="text-2xl font-medium opacity-80">{currentProject.title}</h2>
                                </div>
                                <div className="flex items-center gap-6">
                                    <div className="text-4xl font-mono font-bold text-cyanAccent tracking-wider flex items-center gap-3">
                                        <div className="w-3 h-3 rounded-full bg-red-500 animate-pulse"></div>
                                        {formatTime(currentProject.timeSpent)}
                                    </div>
                                    <button onClick={() => setIsFocusModeOpen(false)} className="bg-white/10 hover:bg-red-500/20 text-white p-3 rounded-xl transition"><IconX /></button>
                                </div>
                            </div>
                            <div className="flex-1 overflow-auto flex items-center justify-center p-8">
                                {focusTarget ? (
                                    <div className="w-full max-w-4xl animate-slide-in">
                                        <div className="text-brandOrange font-bold tracking-widest uppercase mb-4 text-lg">{focusTarget.phase}</div>
                                        <h1 className="text-4xl md:text-5xl font-black mb-10 leading-tight">{focusTarget.item.text}</h1>
                                        <div className="grid grid-cols-1 gap-6 mb-10">
                                            <div className="bg-white/5 border border-white/10 rounded-2xl p-6 focus-within:border-cyanAccent/50 focus-within:bg-white/10 transition-all">
                                                <label className="text-cyanAccent font-bold uppercase tracking-widest mb-3 block">Beobachtungen</label>
                                                <textarea value={focusTarget.item.note || ''} onChange={(e) => updateNestedItem('checklist', focusTarget.phaseIndex, focusTarget.item.id, 'note', e.target.value)} className="w-full bg-transparent outline-none text-xl resize-none placeholder-white/20 min-h-[100px]" placeholder="Tippe hier deine Notizen zum aktuellen Testschritt ein..." />
                                            </div>
                                            <div className="grid grid-cols-2 gap-6">
                                                <div className="bg-white/5 border border-white/10 rounded-2xl p-6 focus-within:border-brandOrange/50 focus-within:bg-white/10 transition-all">
                                                    <label className="text-brandOrange font-bold uppercase tracking-widest mb-3 block">Messwerte</label>
                                                    <textarea value={focusTarget.item.measurements || ''} onChange={(e) => updateNestedItem('checklist', focusTarget.phaseIndex, focusTarget.item.id, 'measurements', e.target.value)} className="w-full bg-transparent outline-none text-xl resize-none placeholder-white/20 min-h-[100px]" placeholder="Messwerte, Zeiten, Lautstärke..." />
                                                </div>
                                                <div className="bg-white/5 border border-white/10 rounded-2xl p-6 focus-within:border-red-500/50 focus-within:bg-white/10 transition-all">
                                                    <label className="text-red-500 font-bold uppercase tracking-widest mb-3 block">Probleme</label>
                                                    <textarea value={focusTarget.item.issues || ''} onChange={(e) => updateNestedItem('checklist', focusTarget.phaseIndex, focusTarget.item.id, 'issues', e.target.value)} className="w-full bg-transparent outline-none text-xl resize-none placeholder-white/20 min-h-[100px]" placeholder="Fehler, Abstürze, Spaltmaße..." />
                                                </div>
                                            </div>
                                        </div>
                                        <button onClick={() => updateNestedItem('checklist', focusTarget.phaseIndex, focusTarget.item.id, 'done', true)} className="w-full bg-green-500 hover:bg-green-400 text-black text-2xl font-black py-6 rounded-2xl transition-all shadow-[0_0_30px_rgba(34,197,94,0.3)] hover:shadow-[0_0_50px_rgba(34,197,94,0.6)] flex justify-center items-center gap-3 active:scale-95">
                                            <IconCheckCircle /> Punkt erledigt & Weiter
                                        </button>
                                    </div>
                                ) : (
                                    <div className="text-center">
                                        <div className="w-24 h-24 bg-green-500/20 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                                        </div>
                                        <h2 className="text-4xl font-black mb-4">Checkliste abgeschlossen!</h2>
                                        <p className="text-white/50 text-xl mb-8">Du hast alle Testpunkte dieses Projekts abgearbeitet.</p>
                                        <button onClick={() => setIsFocusModeOpen(false)} className="bg-white text-black px-8 py-4 rounded-xl font-bold text-lg hover:bg-slate-200 transition">Zurück zur Übersicht</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* FLOATING STOPWATCH — draggable */}
                    <div
                        ref={swRef}
                        style={{ left: swPos.x, top: swPos.y, position: 'fixed', touchAction: 'none' }}
                        className="z-40 flex items-center gap-3 bg-slate-900 dark:bg-white text-white dark:text-black p-3 rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.3)] select-none"
                    >
                        {/* Drag handle — grabbing this moves the widget */}
                        <div
                            className="w-10 h-10 bg-slate-800 dark:bg-slate-200 rounded-xl flex items-center justify-center text-cyanAccent dark:text-brandOrange cursor-grab active:cursor-grabbing"
                            title="Verschieben"
                            onMouseDown={(e) => {
                                e.preventDefault();
                                swDragging.current = true;
                                const rect = swRef.current.getBoundingClientRect();
                                swDragOffset.current = { x: e.clientX - rect.left, y: e.clientY - rect.top };
                            }}
                            onTouchStart={(e) => {
                                swDragging.current = true;
                                const rect = swRef.current.getBoundingClientRect();
                                swDragOffset.current = { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
                            }}
                        >
                            <IconClock />
                        </div>
                        <div className="font-mono text-xl font-bold w-16 text-center tracking-wider">{formatStopwatch(stopwatchTime)}</div>
                        <div className="flex items-center gap-1 border-l border-white/20 dark:border-black/20 pl-3">
                            <button onClick={() => setIsStopwatchRunning(v => !v)} className={`w-8 h-8 rounded-lg flex items-center justify-center transition-colors ${isStopwatchRunning ? 'bg-brandOrange/20 text-brandOrange hover:bg-brandOrange/30' : 'bg-green-500/20 text-green-500 hover:bg-green-500/30'}`}>
                                {isStopwatchRunning ? <IconPause /> : <IconPlay />}
                            </button>
                            <button onClick={() => { setIsStopwatchRunning(false); setStopwatchTime(0); }} className="w-8 h-8 rounded-lg flex items-center justify-center bg-red-500/20 text-red-500 hover:bg-red-500/30 transition-colors"><IconStop /></button>
                        </div>
                    </div>

                    {/* LOGBUCH BUTTON */}
                    <button onClick={() => setIsLogbuchOpen(true)} className={`fixed bottom-8 right-8 z-40 bg-slate-900 dark:bg-white text-white dark:text-black p-4 rounded-full shadow-[0_10px_30px_rgba(0,0,0,0.3)] hover:scale-110 active:scale-95 transition-transform ${isLogbuchOpen ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}>
                        <IconBook />
                    </button>

                    {/* LOGBUCH PANEL */}
                    <div className={`fixed inset-y-0 right-0 w-96 glass-panel border-l border-white/20 shadow-2xl z-50 transform transition-transform duration-300 ease-in-out flex flex-col ${isLogbuchOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="flex items-center justify-between p-6 border-b border-white/10">
                            <h3 className="text-xl font-bold flex items-center gap-2"><IconBook /> Labor Logbuch</h3>
                            <button onClick={() => setIsLogbuchOpen(false)} className="p-2 hover:bg-white/10 rounded-lg transition"><IconX /></button>
                        </div>
                        <div className="flex-1 p-6 flex flex-col">
                            <p className="text-sm text-slate-600 dark:text-white/50 mb-4">Dein globaler Notizzettel. Projektunabhängig. Ideal für PR Kontakte, spontane Ideen oder to do Listen. Speichert automatisch.</p>
                            <textarea value={globalNotes} onChange={(e) => setGlobalNotes(e.target.value)} className="flex-1 w-full bg-white/50 dark:bg-black/30 border border-slate-300/50 dark:border-white/10 rounded-xl p-4 text-sm text-slate-800 dark:text-white/90 placeholder-slate-400 dark:placeholder-white/30 outline-none focus:border-brandOrange shadow-inner resize-none leading-relaxed" placeholder="Notizen hier eintragen..." />
                        </div>
                    </div>

                    {/* MODAL: New Project */}
                    {showNewProjectModal && (
                        <div className="fixed inset-0 bg-slate-900/50 dark:bg-black/80 backdrop-blur-xl z-50 flex items-center justify-center p-4">
                            <div className="glass-panel !bg-white/80 dark:!bg-black/50 rounded-3xl p-8 max-w-md w-full shadow-[0_0_50px_rgba(0,0,0,0.2)] dark:shadow-[0_0_50px_rgba(0,0,0,0.8)] border border-white/50 dark:border-white/20 animate-slide-in">
                                <h3 className="text-2xl font-bold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-brandOrange to-purpleAccent">Neues Projekt anlegen</h3>
                                <div className="space-y-6 mb-8">
                                    <div>
                                        <label className="block text-xs font-bold mb-2 text-slate-500 dark:text-white/50 uppercase tracking-widest">Produktname</label>
                                        <input value={newProjectTitle} onChange={(e) => setNewProjectTitle(e.target.value)} autoFocus onKeyDown={(e) => e.key === 'Enter' && handleCreateProject()} className="w-full bg-white/50 dark:bg-black/50 border border-slate-300/50 dark:border-white/10 rounded-xl p-4 outline-none focus:border-brandOrange text-slate-900 dark:text-white text-lg shadow-inner" placeholder="z.B. Dreame L10s Ultra Gen 3" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold mb-2 text-slate-500 dark:text-white/50 uppercase tracking-widest">Kategorie</label>
                                        <select value={isCreatingCategory ? 'NEW' : newProjectCategory} onChange={(e) => { if (e.target.value === 'NEW') { setIsCreatingCategory(true); setNewProjectCategory('NEW'); } else { setIsCreatingCategory(false); setNewProjectCategory(e.target.value); } }} className="w-full bg-white/50 dark:bg-black/50 border border-slate-300/50 dark:border-white/10 rounded-xl p-4 outline-none focus:border-brandOrange text-slate-900 dark:text-white text-lg shadow-inner appearance-none cursor-pointer">
                                            {categories.map(c => <option key={c.id} value={c.id} className="bg-white dark:bg-slate-900 text-slate-900 dark:text-white">{c.name}</option>)}
                                            <option value="NEW" className="bg-white dark:bg-slate-900 font-bold text-brandOrange">+ Neue Kategorie anlegen...</option>
                                        </select>
                                    </div>
                                    {isCreatingCategory && (
                                        <div>
                                            <label className="block text-xs font-bold mb-2 text-brandOrange uppercase tracking-widest">Name der neuen Kategorie</label>
                                            <input value={newCustomCategory} onChange={(e) => setNewCustomCategory(e.target.value)} className="w-full bg-brandOrange/5 border border-brandOrange/30 rounded-xl p-4 outline-none focus:border-brandOrange text-slate-900 dark:text-white text-lg shadow-inner" placeholder="z.B. E-Scooter" />
                                            <p className="text-xs text-slate-500 dark:text-white/40 mt-2">Die Kategorie wird gespeichert und erhält eine Standard Testvorlage.</p>
                                        </div>
                                    )}
                                </div>
                                <div className="flex justify-end gap-4">
                                    <button onClick={() => { setShowNewProjectModal(false); setIsCreatingCategory(false); }} className="px-6 py-3 rounded-xl hover:bg-slate-200/50 dark:hover:bg-white/10 transition text-sm font-bold text-slate-600 dark:text-white/60 hover:text-slate-900 dark:hover:text-white">Abbrechen</button>
                                    <button onClick={handleCreateProject} className="bg-slate-900 dark:bg-white text-white dark:text-black px-8 py-3 rounded-xl font-black shadow-[0_0_20px_rgba(0,0,0,0.1)] dark:shadow-[0_0_20px_rgba(255,255,255,0.3)] hover:shadow-[0_0_30px_rgba(255,123,0,0.5)] transition transform hover:scale-105 active:scale-95">Erstellen</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL: Confirm Delete */}
                    {projectToDelete && (
                        <div className="fixed inset-0 bg-slate-900/50 dark:bg-black/80 backdrop-blur-xl z-50 flex items-center justify-center p-4">
                            <div className="glass-panel !bg-white/90 dark:!bg-black/50 rounded-3xl p-8 max-w-sm w-full shadow-[0_0_50px_rgba(0,0,0,0.2)] dark:shadow-[0_0_50px_rgba(0,0,0,0.8)] text-center border border-red-500/30 animate-slide-in">
                                <div className="w-16 h-16 bg-red-100 dark:bg-red-500/20 text-red-500 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-[0_0_20px_rgba(239,68,68,0.2)] dark:shadow-[0_0_20px_rgba(239,68,68,0.4)]"><IconTrash /></div>
                                <h3 className="text-xl font-bold mb-3 text-slate-900 dark:text-white">Projekt wirklich löschen?</h3>
                                <p className="text-sm text-slate-600 dark:text-white/50 mb-8">Das kann nicht rückgängig gemacht werden. Alle Daten und Notizen gehen verloren.</p>
                                <div className="flex justify-center gap-4">
                                    <button onClick={() => setProjectToDelete(null)} className="px-6 py-3 rounded-xl hover:bg-slate-200/50 dark:hover:bg-white/10 transition text-sm font-bold text-slate-600 dark:text-white/60">Abbrechen</button>
                                    <button onClick={confirmDeleteProject} className="bg-red-500 hover:bg-red-600 text-white px-8 py-3 rounded-xl font-black shadow-[0_0_20px_rgba(239,68,68,0.4)] transition transform hover:scale-105 active:scale-95">Ja, löschen</button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
