        /* Dark mode via .dark class on <html> */
        @custom-variant dark (&:where(.dark, .dark *));

        @theme {
            /* Custom Colors */
            --color-deepBlue: #050A15;
            --color-slateGray: #1E293B;
            --color-cyanAccent: #00F0FF;
            --color-purpleAccent: #B026FF;
            --color-brandOrange: #FF7B00;
            --color-lightBg: #F8FAFC;

            /* Custom Animations */
            --animate-blob: blob 10s infinite;
            --animate-pulse-slow: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            --animate-glow-pulse: glow 2s ease-in-out infinite alternate;
            --animate-slide-in: slideIn 0.3s ease-out forwards;
            --animate-fade-in: fadeIn 0.2s ease-out forwards;
        }

        @keyframes blob {
            0%   { transform: translate(0px, 0px) scale(1); }
            33%  { transform: translate(30px, -50px) scale(1.1); }
            66%  { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        @keyframes glow {
            0%   { opacity: 0.6; box-shadow: 0 0 10px rgba(0,240,255,0.4); }
            100% { opacity: 1;   box-shadow: 0 0 25px rgba(0,240,255,0.9), 0 0 40px rgba(176,38,255,0.6); }
        }
        @keyframes slideIn {
            0%   { transform: translateY(100%); opacity: 0; }
            100% { transform: translateY(0);    opacity: 1; }
        }
        @keyframes fadeIn {
            0%   { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>

            border-left: 1px solid rgba(255,255,255,0.1);

        .bg-mesh {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1; background-color: #E2E8F0; overflow: hidden; transition: background-color 0.3s;
        }
        .dark .bg-mesh { background-color: #050A15; }
        .bg-mesh::before, .bg-mesh::after {
            content: ''; position: absolute; border-radius: 50%;

        }
        .bg-mesh::before { background: #B026FF; width: 50vw; height: 50vw; top: -10vw; left: -10vw; }
        .bg-mesh::after { background: #FF7B00; width: 40vw; height: 40vw; bottom: -5vw; right: -10vw; animation-delay: -5s; }

        input[type="checkbox"] { transition: background-color 0.15s, border-color 0.15s; }

        /* Textarea focus ring fix */
        textarea:focus, input:focus { transition: border-color 0.15s, box-shadow 0.15s; }
    </style>
</head>

        // ─── MEMOIZED: CHECKLIST ITEM ────────────────────────────────────────────────
        // Prevents all checklist items re-rendering when ONE item's textarea changes.
        const ChecklistItem = memo(({ item, phaseIndex, itemIndex, isExpanded, onExpand, onToggle, onUpdate, onDelete, onDragStart, onDragEnter, onDragEnd }) => {

                    </div>

                    {/* Inline preview when notes exist but panel is collapsed */}
                    {hasAnyNotes && !isExpanded && (

                    )}

                    {/* Expanded notes input area */}
                    {isExpanded && (
                        <div className="px-12 pb-5 pt-2 bg-slate-100/50 dark:bg-black/40 border-t border-slate-300/50 dark:border-white/5 grid grid-cols-1 gap-4">
                            <div>

                                />

                                        value={item.issues || ''}
                                        onChange={(e) => onUpdate('issues', e.target.value)}
                                        placeholder="Abstürze, Navigation hängt fest, Spaltmaße..."
                                        className="w-full bg-red-50 dark:bg-red-900/10 border border-red-300/50 dark:border-red-500/30 rounded-lg p-2.5 text-sm text-slate-800 dark:text-white/90 placeholder-red-400/50 outline-none focus:border-red-500 shadow-inner min-h-[120px]"
                                    />

        });

        // ─── MEMOIZED: SHOTLIST ITEM ─────────────────────────────────────────────────
        const ShotlistItem = memo(({ item, onToggle, onDelete, onDragStart, onDragEnter, onDragEnd }) => (
            <div
                draggable
                onDragStart={onDragStart}
                onDragEnter={onDragEnter}
                onDragEnd={onDragEnd}
                onDragOver={(e) => e.preventDefault()}
                className={`group flex items-center gap-3 p-3 rounded-xl border border-slate-300/50 dark:border-white/10 bg-white/60 dark:bg-black/20 transition-all hover:border-purpleAccent/30 ${item.done ? 'opacity-50 border-green-500/30 bg-green-100 dark:bg-green-900/10' : ''}`}
            >
                <div className="cursor-grab active:cursor-grabbing text-slate-400 dark:text-white/30 hover:text-purpleAccent transition"><IconGrip /></div>
                <input
                    type="checkbox"
                    checked={item.done}
                    onChange={(e) => onToggle(e.target.checked)}
                    className="w-5 h-5 rounded border-slate-300 dark:border-white/20 bg-white dark:bg-black/50 accent-purpleAccent cursor-pointer"
                />
                <span className={`flex-1 font-medium text-sm ${item.done ? 'line-through text-slate-500 dark:text-white/50' : 'text-slate-700 dark:text-white/90'}`}>{item.text}</span>
                <button onClick={onDelete} className="opacity-0 group-hover:opacity-100 text-slate-400 dark:text-white/30 hover:text-red-500 dark:hover:text-red-400 p-1 rounded-lg transition">
                    <IconTrash />
                </button>
            </div>
        ));

        // ─── MEMOIZED: PROJECT LIST ITEM ─────────────────────────────────────────────
        const ProjectListItem = memo(({ project, isActive, onSelect, onDelete, onDragStart, onDragEnter, onDragEnd }) => (
            <div
                draggable
                onDragStart={onDragStart}
                onDragEnter={onDragEnter}
                onDragEnd={onDragEnd}
                onDragOver={(e) => e.preventDefault()}
                onClick={onSelect}
                className={`group flex items-center justify-between p-3 rounded-xl cursor-pointer transition-all duration-200 ${
                    isActive
                        ? 'bg-brandOrange/10 dark:bg-brandOrange/20 border border-brandOrange/50 shadow-[0_0_20px_rgba(255,123,0,0.15)] text-slate-900 dark:text-white'
                        : 'hover:bg-white/40 dark:hover:bg-white/10 border border-transparent text-slate-600 dark:text-white/70 hover:text-slate-900 dark:hover:text-white'
                } ${project.status === 'done' ? 'opacity-60 grayscale-[50%]' : ''}`}
            >
                <div className="flex items-center gap-2 overflow-hidden w-full">
                    <div className="cursor-grab active:cursor-grabbing text-slate-300 dark:text-white/20 hover:text-brandOrange shrink-0"><IconGrip /></div>
                    <div className="flex flex-col flex-1 overflow-hidden">
                        <div className="flex items-center gap-2">
                            <div className="truncate text-sm font-medium">{project.title}</div>
                            {project.status === 'done' && <span className="text-green-500 shrink-0"><IconCheckCircle /></span>}
                        </div>
                        <div className="text-[10px] font-mono text-slate-500 dark:text-white/40 uppercase tracking-wider flex items-center gap-1.5 mt-0.5">
                            <IconClock /> {formatTime(project.timeSpent)}
                            {project.status !== 'done' && isActive && (
                                <div className="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse ml-1"></div>
                            )}
                        </div>
                    </div>
                </div>
                <button
                    onClick={(e) => { e.stopPropagation(); onDelete(); }}
                    className="opacity-0 group-hover:opacity-100 p-1.5 hover:text-red-500 hover:bg-red-100 dark:hover:bg-red-500/20 rounded-md transition shrink-0"
                >
                    <IconTrash />
                </button>
            </div>
        ));

        // ─── MAIN APP ────────────────────────────────────────────────────────────────
        const App = () => {
            const [theme, setTheme] = useState(() => localStorage.getItem('ttv_theme') || 'dark');
            const [categories, setCategories] = useState(() => JSON.parse(localStorage.getItem('ttv_categories')) || INITIAL_CATEGORIES);
            const [projects, setProjects] = useState(() => JSON.parse(localStorage.getItem('ttv_projects')) || []);
            const [currentProjectId, setCurrentProjectId] = useState(null);
            const [activeTab, setActiveTab] = useState('checklist');
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [isFocusModeOpen, setIsFocusModeOpen] = useState(false);
            const [globalNotes, setGlobalNotes] = useState(() => localStorage.getItem('ttv_global_notes') || '');
            const [isLogbuchOpen, setIsLogbuchOpen] = useState(false);
            const [toastMessage, setToastMessage] = useState(null);
            const [stopwatchTime, setStopwatchTime] = useState(0);
            const [isStopwatchRunning, setIsStopwatchRunning] = useState(false);
            const [showNewProjectModal, setShowNewProjectModal] = useState(false);
            const [newProjectTitle, setNewProjectTitle] = useState('');
            const [newProjectCategory, setNewProjectCategory] = useState(categories[0]?.id || 'saugroboter');
            const [isCreatingCategory, setIsCreatingCategory] = useState(false);
            const [newCustomCategory, setNewCustomCategory] = useState('');
            const [projectToDelete, setProjectToDelete] = useState(null);
            const [isEditingTitle, setIsEditingTitle] = useState(false);
            const [editTitleValue, setEditTitleValue] = useState('');
            const [newChecklistText, setNewChecklistText] = useState({});
            const [newShotlistText, setNewShotlistText] = useState({});
            const [expandedChecklistId, setExpandedChecklistId] = useState(null);
            const [collapsedPhases, setCollapsedPhases] = useState({});
            const [newSpecKey, setNewSpecKey] = useState('');
            const [newProText, setNewProText] = useState('');
            const [newConText, setNewConText] = useState('');

            const fileInputRef = useRef(null);
            const dragProjectIndex = useRef(null);
            const dragOverProjectIndex = useRef(null);
            const dragNestedItem = useRef({ phaseIndex: null, itemIndex: null });
            const dragOverNestedItem = useRef({ phaseIndex: null, itemIndex: null });
            // Store interval IDs in refs for reliable cleanup
            const projectTimerRef = useRef(null);
            const stopwatchIntervalRef = useRef(null);
            // Draggable stopwatch widget
            const [swPos, setSwPos] = useState(() => {
                try { return JSON.parse(localStorage.getItem('ttv_sw_pos')) || { x: 32, y: window.innerHeight - 80 }; }
                catch { return { x: 32, y: window.innerHeight - 80 }; }
            });
            const swDragging = useRef(false);
            const swDragOffset = useRef({ x: 0, y: 0 });
            const swRef = useRef(null);

            // ── Theme ────────────────────────────────────────────────────────────────
            useEffect(() => {
                document.documentElement.classList.toggle('dark', theme === 'dark');
                localStorage.setItem('ttv_theme', theme);
            }, [theme]);

            // ── Persist data ─────────────────────────────────────────────────────────
            useEffect(() => {
                localStorage.setItem('ttv_categories', JSON.stringify(categories));
                localStorage.setItem('ttv_projects', JSON.stringify(projects));
            }, [categories, projects]);

            useEffect(() => {
                localStorage.setItem('ttv_global_notes', globalNotes);
            }, [globalNotes]);

            // ── Stopwatch (stable via ref) ────────────────────────────────────────────
            useEffect(() => {
                if (isStopwatchRunning) {
                    stopwatchIntervalRef.current = setInterval(() => setStopwatchTime(t => t + 1), 1000);
                } else {
                    clearInterval(stopwatchIntervalRef.current);
                }
                return () => clearInterval(stopwatchIntervalRef.current);
            }, [isStopwatchRunning]);

            // ── Stopwatch drag handlers (global mouse events) ────────────────────────
            useEffect(() => {
                const onMove = (e) => {
                    if (!swDragging.current) return;
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    const el = swRef.current;
                    const w = el ? el.offsetWidth : 200;
                    const h = el ? el.offsetHeight : 60;
                    const newX = Math.max(0, Math.min(window.innerWidth - w, clientX - swDragOffset.current.x));
                    const newY = Math.max(0, Math.min(window.innerHeight - h, clientY - swDragOffset.current.y));
                    setSwPos({ x: newX, y: newY });
                };
                const onUp = () => {
                    if (!swDragging.current) return;
                    swDragging.current = false;
                    // Persist last position
                    setSwPos(prev => {
                        localStorage.setItem('ttv_sw_pos', JSON.stringify(prev));
                        return prev;
                    });
                };
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onUp);
                window.addEventListener('touchmove', onMove, { passive: true });
                window.addEventListener('touchend', onUp);
                return () => {
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('mouseup', onUp);
                    window.removeEventListener('touchmove', onMove);
                    window.removeEventListener('touchend', onUp);
                };
            }, []);

            // ── Project timer (stable via ref) ───────────────────────────────────────
            const currentProject = projects.find(p => p.id === currentProjectId);
            const isProjectRunning = !!currentProjectId && currentProject?.status !== 'done';

            useEffect(() => {
                clearInterval(projectTimerRef.current);
                if (!isProjectRunning) return;
                const id = currentProjectId; // capture in closure
                projectTimerRef.current = setInterval(() => {
                    setProjects(prev => prev.map(p =>
                        p.id === id ? { ...p, timeSpent: (p.timeSpent || 0) + 1 } : p
                    ));
                }, 1000);
                return () => clearInterval(projectTimerRef.current);
            }, [currentProjectId, isProjectRunning]);

            // ── Toast ────────────────────────────────────────────────────────────────
            const showToast = useCallback((msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(null), 3000);
            }, []);

            // ── Project helpers ──────────────────────────────────────────────────────
            const switchProject = useCallback((id) => {
                setCurrentProjectId(id);
                setActiveTab('checklist');
                setExpandedChecklistId(null);
            }, []);

            // Stable updater — uses functional form so no stale closure on currentProjectId
            const updateCurrentProject = useCallback((updates) => {
                setProjects(prev => prev.map(p =>
                    p.id === currentProjectId ? { ...p, ...updates } : p
                ));
            }, [currentProjectId]);

            const toggleProjectStatus = useCallback(() => {
                if (!currentProject) return;
                updateCurrentProject({ status: currentProject.status === 'done' ? 'draft' : 'done' });
            }, [currentProject, updateCurrentProject]);

            // ── Scores ───────────────────────────────────────────────────────────────
            const calculatedScore = useMemo(() => {
                if (!currentProject?.scores) return "0.0";
                const vals = Object.values(currentProject.scores);
                return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : "0.0";
            }, [currentProject?.scores]);

            // ── Progress ─────────────────────────────────────────────────────────────
            const { totalTasks, completedTasks } = useMemo(() => {
                if (!currentProject) return { totalTasks: 0, completedTasks: 0 };
                let t = 0, c = 0;
                [...(currentProject.checklist || []), ...(currentProject.shotlist || [])].forEach(phase => {
                    t += phase.items.length;
                    c += phase.items.filter(i => i.done).length;
                });
                return { totalTasks: t, completedTasks: c };
            }, [currentProject?.checklist, currentProject?.shotlist]);

            const progressPercent = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);

            // ── Import / Export ──────────────────────────────────────────────────────
            const exportData = useCallback(() => {
                const blob = new Blob([JSON.stringify({ projects, categories, globalNotes })], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = Object.assign(document.createElement("a"), {
                    href: url,
                    download: `TestsiegerTV_Backup_${new Date().toISOString().split('T')[0]}.json`
                });
                a.click();
                URL.revokeObjectURL(url);
                showToast("Backup erfolgreich exportiert!");
            }, [projects, categories, globalNotes, showToast]);

            const importData = useCallback((e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.projects) setProjects(data.projects);
                        if (data.categories) setCategories(data.categories);
                        if (data.globalNotes !== undefined) setGlobalNotes(data.globalNotes);
                        showToast("Backup erfolgreich importiert!");
                    } catch { showToast("Fehler beim Import: Datei ungültig."); }
                };
                reader.readAsText(file);
                e.target.value = null;
            }, [showToast]);

            // ── Markdown Export ──────────────────────────────────────────────────────
            const handleExportMarkdown = useCallback(() => {
                if (!currentProject) return;
                const catName = categories.find(c => c.id === currentProject.category)?.name || currentProject.category;
                let md = `# Datenblatt: ${currentProject.title}\n\n`;
                md += `**Kategorie:** ${catName}\n**Zeit im Test:** ${formatTime(currentProject.timeSpent)}\n**Gesamtnote:** ${calculatedScore} / 10\n\n`;
                md += `## 🎯 Stärken & Schwächen\n`;
                md += `**🟢 Pro:**\n${currentProject.data.pros.map(x => `* ${x}`).join('\n') || '* Keine erfasst'}\n\n`;
                md += `**🔴 Contra:**\n${currentProject.data.cons.map(x => `* ${x}`).join('\n') || '* Keine erfasst'}\n\n`;
                md += `## 📋 Testbedingungen\n${currentProject.data.conditions || 'Keine erfasst'}\n\n`;
                md += `## 🔬 Labor Notizen & Auffälligkeiten\n`;
                let hasNotes = false;
                currentProject.checklist.forEach(phase => {
                    const phaseNotes = phase.items.filter(i => i.note || i.measurements || i.issues);
                    if (phaseNotes.length > 0) {
                        hasNotes = true;
                        md += `### ${phase.phase}\n`;
                        phaseNotes.forEach(item => {
                            md += `**${item.text}**\n`;
                            if (item.note) md += `> Beobachtung: ${item.note}\n`;
                            if (item.measurements) md += `> Messwerte: ${item.measurements}\n`;
                            if (item.issues) md += `> Probleme: ${item.issues}\n`;
                            md += `\n`;
                        });
                    }
                });
                if (!hasNotes) md += `*Keine detaillierten Notizen erfasst.*\n\n`;
                md += `## ⚖️ Spezifikationen\n| Eigenschaft | ${currentProject.title} | ${currentProject.comparison.predecessor || 'Vorgänger'} | ${currentProject.comparison.competitor || 'Konkurrent'} |\n|---|---|---|---|\n`;
                currentProject.comparison.specs.forEach(s => {
                    md += `| ${s.key || 'k.A.'} | ${s.current || '-'} | ${s.pred || '-'} | ${s.comp || '-'} |\n`;
                });

                const ta = Object.assign(document.createElement("textarea"), { value: md, style: "position:fixed;left:-999999px" });
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); showToast("Markdown in Zwischenablage kopiert!"); }
                catch { /* silent fail */ }
                document.body.removeChild(ta);
            }, [currentProject, categories, calculatedScore, showToast]);

            // ── Project CRUD ─────────────────────────────────────────────────────────
            const handleCreateProject = useCallback(() => {
                if (!newProjectTitle.trim()) return;
                let catId = newProjectCategory;
                if (isCreatingCategory && newCustomCategory.trim()) {
                    catId = newCustomCategory.trim().toLowerCase().replace(/[^a-z0-9]/g, '_');
                    if (!categories.find(c => c.id === catId)) {
                        setCategories(prev => [...prev, { id: catId, name: newCustomCategory.trim() }]);
                    }
                }
                const workflowTemplate = WORKFLOWS[catId] || WORKFLOWS.technik;
                const specKeys = DEFAULT_SPECS_TEMPLATES[catId] || DEFAULT_SPECS_TEMPLATES.technik;
                const newProject = {
                    id: generateId(), title: newProjectTitle, category: catId,
                    status: 'draft', timeSpent: 0, createdAt: new Date().toISOString(),
                    checklist: workflowTemplate.checklist.map(pb => ({
                        phase: pb.phase,
                        items: pb.items.map(def => {
                            const text = typeof def === 'string' ? def : def.text;
                            const defMeas = typeof def === 'string' ? '' : (def.defaultMeasurements || '');
                            return { id: generateId(), text, done: false, note: '', measurements: defMeas, issues: '' };
                        })
                    })),
                    shotlist: workflowTemplate.shotlist.map(pb => ({
                        phase: pb.phase,
                        items: pb.items.map(def => ({ id: generateId(), text: typeof def === 'string' ? def : def.text, done: false }))
                    })),
                    scores: { ...workflowTemplate.scores },
                    data: { pros: [], cons: [], notes: '', conditions: 'Firmware: \nTestdauer: \nBodenbeläge: Hartboden, Teppich' },
                    comparison: {
                        model: newProjectTitle, predecessor: '', competitor: '',
                        specs: specKeys.map(key => ({ id: generateId(), key, current: '', pred: '', comp: '' }))
                    }
                };
                setProjects(prev => [...prev, newProject]);
                switchProject(newProject.id);
                setShowNewProjectModal(false);
                setNewProjectTitle('');
                setIsCreatingCategory(false);
                setNewCustomCategory('');
            }, [newProjectTitle, newProjectCategory, isCreatingCategory, newCustomCategory, categories, switchProject]);

            const confirmDeleteProject = useCallback(() => {
                if (!projectToDelete) return;
                setProjects(prev => prev.filter(p => p.id !== projectToDelete));
                if (currentProjectId === projectToDelete) setCurrentProjectId(null);
                setProjectToDelete(null);
            }, [projectToDelete, currentProjectId]);

            // ── Title editing ────────────────────────────────────────────────────────
            const handleTitleSave = useCallback(() => {
                if (editTitleValue.trim()) updateCurrentProject({ title: editTitleValue.trim() });
                setIsEditingTitle(false);
            }, [editTitleValue, updateCurrentProject]);

            // ── Drag & Drop: Projects ─────────────────────────────────────────────────
            const handleProjectDragStart = useCallback((e, index) => {
                dragProjectIndex.current = index;
                e.currentTarget.classList.add('opacity-40', 'scale-95');
            }, []);
            const handleProjectDragEnter = useCallback((e, index) => { dragOverProjectIndex.current = index; }, []);
            const handleProjectDragEnd = useCallback((e) => {
                e.currentTarget.classList.remove('opacity-40', 'scale-95');
                const from = dragProjectIndex.current;
                const to = dragOverProjectIndex.current;
                if (from === null || to === null || from === to) return;
                setProjects(prev => {
                    const arr = [...prev];
                    arr.splice(to, 0, arr.splice(from, 1)[0]);
                    return arr;
                });
                dragProjectIndex.current = null;
                dragOverProjectIndex.current = null;
            }, []);

            // ── Drag & Drop: Nested items ─────────────────────────────────────────────
            const handleNestedDragStart = useCallback((e, phaseIndex, itemIndex) => {
                dragNestedItem.current = { phaseIndex, itemIndex };
                e.currentTarget.classList.add('dragging');
            }, []);
            const handleNestedDragEnter = useCallback((e, phaseIndex, itemIndex) => {
                dragOverNestedItem.current = { phaseIndex, itemIndex };
            }, []);
            const handleNestedDragEnd = useCallback((e, listKey) => {
                e.currentTarget.classList.remove('dragging');
                const { phaseIndex: fromPhase, itemIndex: fromItem } = dragNestedItem.current;
                const { phaseIndex: toPhase, itemIndex: toItem } = dragOverNestedItem.current;
                if (fromPhase === null || toPhase === null) return;
                setProjects(prev => prev.map(p => {
                    if (p.id !== currentProjectId) return p;
                    const newList = p[listKey].map(ph => ({ ...ph, items: [...ph.items] }));
                    const dragged = newList[fromPhase].items.splice(fromItem, 1)[0];
                    newList[toPhase].items.splice(toItem, 0, dragged);
                    return { ...p, [listKey]: newList };
                }));
                dragNestedItem.current = { phaseIndex: null, itemIndex: null };
                dragOverNestedItem.current = { phaseIndex: null, itemIndex: null };
            }, [currentProjectId]);

            // ── List manipulation ────────────────────────────────────────────────────
            // Uses functional setProjects form: no dependency on currentProject snapshot
            const updateNestedItem = useCallback((listKey, phaseIndex, itemId, field, value) => {
                setProjects(prev => prev.map(p => {
                    if (p.id !== currentProjectId) return p;
                    const newList = p[listKey].map((phase, pIdx) =>
                        pIdx !== phaseIndex ? phase : {
                            ...phase,
                            items: phase.items.map(item => item.id === itemId ? { ...item, [field]: value } : item)
                        }
                    );
                    return { ...p, [listKey]: newList };
                }));
            }, [currentProjectId]);

            const markPhaseDone = useCallback((listKey, phaseIndex, e) => {
                e.stopPropagation();
                setProjects(prev => prev.map(p => {
                    if (p.id !== currentProjectId) return p;
                    const newList = p[listKey].map((phase, pIdx) =>
                        pIdx !== phaseIndex ? phase : {
                            ...phase,
                            items: phase.items.map(item => ({ ...item, done: true }))
                        }
                    );
                    return { ...p, [listKey]: newList };
                }));
                showToast("Komplette Phase abgehakt!");
            }, [currentProjectId, showToast]);

            const addNestedItem = useCallback((listKey, phaseIndex, textVal, setInputState) => {
                if (!textVal?.trim()) return;
                setProjects(prev => prev.map(p => {
                    if (p.id !== currentProjectId) return p;
                    const newItem = { id: generateId(), text: textVal.trim(), done: false,
                        ...(listKey === 'checklist' ? { note: '', measurements: '', issues: '' } : {}) };
                    const newList = p[listKey].map((phase, pIdx) =>
                        pIdx !== phaseIndex ? phase : { ...phase, items: [...phase.items, newItem] }
                    );
                    return { ...p, [listKey]: newList };
                }));
                setInputState(prev => ({ ...prev, [phaseIndex]: '' }));
            }, [currentProjectId]);

            const deleteNestedItem = useCallback((listKey, phaseIndex, itemId) => {
                setProjects(prev => prev.map(p => {
                    if (p.id !== currentProjectId) return p;
                    const newList = p[listKey].map((phase, pIdx) =>
                        pIdx !== phaseIndex ? phase : { ...phase, items: phase.items.filter(item => item.id !== itemId) }
                    );
                    return { ...p, [listKey]: newList };
                }));
            }, [currentProjectId]);

            const togglePhaseCollapse = useCallback((listKey, phaseIndex) => {
                setCollapsedPhases(prev => ({ ...prev, [`${listKey}_${phaseIndex}`]: !prev[`${listKey}_${phaseIndex}`] }));
            }, []);

            const addProCon = useCallback((type, val, setValFn) => {
                if (!val.trim()) return;
                updateCurrentProject({ data: { ...currentProject.data, [type]: [...currentProject.data[type], val.trim()] } });
                setValFn('');
            }, [currentProject, updateCurrentProject]);

            const removeProCon = useCallback((type, index) => {
                const arr = [...currentProject.data[type]];
                arr.splice(index, 1);
                updateCurrentProject({ data: { ...currentProject.data, [type]: arr } });
            }, [currentProject, updateCurrentProject]);

            const updateSpec = useCallback((specId, field, value) => {
                const newSpecs = currentProject.comparison.specs.map(s =>
                    s.id === specId ? { ...s, [field]: value } : s
                );
                updateCurrentProject({ comparison: { ...currentProject.comparison, specs: newSpecs } });
            }, [currentProject, updateCurrentProject]);

            const addSpecRow = useCallback(() => {
                if (!newSpecKey.trim()) return;
                const newSpecs = [...currentProject.comparison.specs, { id: generateId(), key: newSpecKey, current: '', pred: '', comp: '' }];
                updateCurrentProject({ comparison: { ...currentProject.comparison, specs: newSpecs } });
                setNewSpecKey('');
            }, [newSpecKey, currentProject, updateCurrentProject]);

            // ── Focus Mode ───────────────────────────────────────────────────────────
            const focusTarget = useMemo(() => {
                if (!currentProject || !isFocusModeOpen) return null;
                for (let pIdx = 0; pIdx < currentProject.checklist.length; pIdx++) {
                    for (let iIdx = 0; iIdx < currentProject.checklist[pIdx].items.length; iIdx++) {
                        if (!currentProject.checklist[pIdx].items[iIdx].done) {
                            return { phaseIndex: pIdx, itemIndex: iIdx, item: currentProject.checklist[pIdx].items[iIdx], phase: currentProject.checklist[pIdx].phase };
                        }
                    }
                }
                return null;
            }, [currentProject, isFocusModeOpen]);

            // ── Render ───────────────────────────────────────────────────────────────
            return (
                <div className="flex h-screen overflow-hidden text-slate-800 dark:text-white transition-colors duration-300">

                    {/* TOAST */}
                    {toastMessage && (
                        <div className="fixed top-6 left-1/2 transform -translate-x-1/2 z-[100] bg-slate-900 dark:bg-white text-white dark:text-black px-6 py-3 rounded-full font-bold shadow-[0_10px_30px_rgba(0,0,0,0.3)] flex items-center gap-3 animate-slide-in">
                            <IconCheckCircle /> {toastMessage}
                        </div>
                    )}

                    {/* SIDEBAR */}
                    <aside className={`fixed inset-y-0 left-0 z-40 transform transition-transform duration-300 w-[300px] glass-panel border-r border-slate-300/50 dark:border-white/10 flex flex-col shrink-0 shadow-2xl bg-white/50 dark:bg-black/80 backdrop-blur-3xl ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                        <div className="p-6 border-b border-slate-300/50 dark:border-white/10 flex justify-between items-center bg-white/20 dark:bg-white/5">
                            <BrandLogo />
                            <button onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} className="p-2 rounded-full hover:bg-slate-200/50 dark:hover:bg-white/10 transition">
                                {theme === 'dark' ? <IconSun /> : <IconMoon />}
                            </button>
                        </div>

                        <div className="p-5 border-b border-slate-300/50 dark:border-white/10 shrink-0">
                            <button
                                onClick={() => { setIsCreatingCategory(false); setShowNewProjectModal(true); }}
                                className="w-full bg-white/50 dark:bg-white/10 hover:bg-white/80 dark:hover:bg-white/20 border border-slate-300/50 dark:border-brandOrange/50 text-slate-800 dark:text-white py-3 rounded-xl text-sm font-bold flex justify-center items-center gap-2 transition-all shadow-[0_4px_15px_rgba(0,0,0,0.05)] dark:shadow-[0_4px_15px_rgba(255,123,0,0.15)] hover:shadow-[0_4px_25px_rgba(255,123,0,0.3)]"
                            >
                                <IconPlus /> Neues Projekt
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto px-3 py-4">
                            <div className="text-xs font-bold uppercase text-slate-500 dark:text-white/40 px-3 mb-3 tracking-widest">Deine Projekte</div>
                            <div className="space-y-2">
                                {projects.map((p, index) => (
                                    <ProjectListItem
                                        key={p.id}
                                        project={p}
                                        isActive={currentProjectId === p.id}
                                        onSelect={() => switchProject(p.id)}
                                        onDelete={() => setProjectToDelete(p.id)}
                                        onDragStart={(e) => handleProjectDragStart(e, index)}
                                        onDragEnter={(e) => handleProjectDragEnter(e, index)}
                                        onDragEnd={handleProjectDragEnd}
                                    />
                                ))}
                                {projects.length === 0 && (
                                    <div className="text-sm text-slate-500 dark:text-white/30 text-center mt-10 px-4 border border-dashed border-slate-300 dark:border-white/10 rounded-xl p-6">
                                        Keine Projekte vorhanden.<br/>Klick auf 'Neues Projekt'.
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="p-4 border-t border-slate-300/50 dark:border-white/10 bg-slate-100/50 dark:bg-black/40 shrink-0">
                            <div className="text-[10px] font-bold uppercase text-slate-500 dark:text-white/40 mb-3 tracking-widest px-2">Daten Sync</div>
                            <div className="flex gap-2">
                                <button onClick={exportData} className="flex-1 bg-white/50 dark:bg-white/10 hover:bg-white dark:hover:bg-white/20 text-slate-700 dark:text-white py-2 rounded-lg text-xs font-bold flex flex-col items-center justify-center gap-1 transition shadow-sm border border-slate-300/50 dark:border-white/10">
                                    <IconDownload /> Backup
                                </button>
                                <button onClick={() => fileInputRef.current.click()} className="flex-1 bg-white/50 dark:bg-white/10 hover:bg-white dark:hover:bg-white/20 text-slate-700 dark:text-white py-2 rounded-lg text-xs font-bold flex flex-col items-center justify-center gap-1 transition shadow-sm border border-slate-300/50 dark:border-white/10">
                                    <IconUpload /> Import
                                </button>
                                <input type="file" accept=".json" ref={fileInputRef} onChange={importData} className="hidden"/>
                            </div>
                        </div>
                    </aside>

                    {/* MAIN */}
                    <main className={`flex-1 flex flex-col h-full relative z-10 transition-all duration-300 ${isSidebarOpen ? 'md:ml-[300px]' : 'ml-0'}`}>
                        {currentProject ? (
                            <>
                                {/* Header */}
                                <header className="h-20 border-b border-slate-300/50 dark:border-white/10 px-6 flex items-center justify-between shrink-0 glass-panel !border-l-0 !border-t-0 !border-r-0 !rounded-none z-20">
                                    <div className="flex items-center gap-4">
                                        <button onClick={() => setIsSidebarOpen(v => !v)} className="p-2 -ml-2 rounded-lg text-slate-600 dark:text-white/70 hover:bg-slate-200 dark:hover:bg-white/10 transition-colors">
                                            <IconMenu />
                                        </button>
                                        {isEditingTitle ? (
                                            <input
                                                autoFocus
                                                value={editTitleValue}
                                                onChange={(e) => setEditTitleValue(e.target.value)}
                                                onBlur={handleTitleSave}
                                                onKeyDown={(e) => e.key === 'Enter' && handleTitleSave()}
                                                className="bg-white/50 dark:bg-white/10 border border-brandOrange rounded-lg px-3 py-1.5 text-2xl font-bold text-slate-900 dark:text-white outline-none w-64 shadow-[0_0_15px_rgba(255,123,0,0.2)]"
                                            />
                                        ) : (
                                            <h2 className="text-2xl font-bold flex items-center gap-3 cursor-pointer group" onClick={() => { setEditTitleValue(currentProject.title); setIsEditingTitle(true); }}>
                                                {currentProject.title}
                                                <span className="opacity-0 group-hover:opacity-50 text-brandOrange transition"><IconEdit /></span>
                                            </h2>
                                        )}
                                        <span className="px-3 py-1 rounded-full text-xs font-semibold bg-white/50 dark:bg-white/10 border border-slate-300 dark:border-white/10 uppercase tracking-widest text-brandOrange shadow-[inset_0_0_10px_rgba(255,255,255,0.05)] hidden sm:inline-block">
                                            {categories.find(c => c.id === currentProject.category)?.name || currentProject.category}
                                        </span>
                                    </div>

                                    <div className="flex items-center gap-3 bg-white/40 dark:bg-black/20 p-1.5 rounded-xl border border-slate-300/50 dark:border-white/10 backdrop-blur-xl">
                                        <button onClick={() => setIsFocusModeOpen(true)} className="px-4 py-1.5 rounded-lg text-sm font-bold flex items-center gap-2 bg-slate-900 text-cyanAccent hover:bg-black transition-all shadow-sm border border-cyanAccent/30">
                                            <IconTarget /> Labor-Modus
                                        </button>
                                        <button onClick={handleExportMarkdown} className="px-4 py-1.5 rounded-lg text-sm font-bold flex items-center gap-2 bg-slate-200/50 dark:bg-white/10 hover:bg-brandOrange hover:text-white text-slate-700 dark:text-white transition-all shadow-sm">
                                            <IconCopy /> Export
                                        </button>
                                        <div className="w-px h-6 bg-slate-300 dark:bg-white/20 mx-1"></div>
                                        <div className={`px-2 py-1.5 flex items-center gap-2 font-mono text-lg font-bold ${currentProject.status === 'done' ? 'text-green-500 dark:text-green-400' : 'text-slate-800 dark:text-white'}`}>
                                            <IconClock /> {formatTime(currentProject.timeSpent)}
                                            {currentProject.status !== 'done' && <div className="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>}
                                        </div>
                                        <button
                                            onClick={toggleProjectStatus}
                                            className={`px-4 py-1.5 rounded-lg text-sm font-bold flex items-center gap-2 transition-all ${currentProject.status === 'done' ? 'bg-slate-200 dark:bg-white/10 text-slate-700 dark:text-white hover:bg-slate-300 dark:hover:bg-white/20' : 'bg-green-500 text-white shadow-[0_0_15px_rgba(34,197,94,0.4)] hover:shadow-[0_0_20px_rgba(34,197,94,0.6)]'}`}
                                        >
                                            {currentProject.status === 'done' ? 'Wieder öffnen' : <><IconCheckCircle /> Fertig</>}
                                        </button>
                                    </div>
                                </header>

                                {/* Progress Bar */}
                                <div className="w-full h-1.5 bg-slate-200 dark:bg-black/40 relative overflow-hidden z-20">
                                    <div className="h-full bg-gradient-to-r from-cyanAccent to-purpleAccent animate-glow-pulse transition-all duration-700 ease-out" style={{ width: `${progressPercent}%` }}></div>
                                </div>

                                {/* Tabs */}
                                <div className="px-8 pt-6 pb-2 flex items-center gap-2">
                                    {[
                                        { id: 'report', icon: <IconFileText />, label: 'Bericht', orange: true },
                                    ].map(tab => (
                                        <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-all ${activeTab === tab.id ? 'bg-brandOrange text-white shadow-[0_4px_12px_rgba(255,123,0,0.3)]' : 'text-slate-500 dark:text-white/50 hover:text-slate-900 dark:hover:text-white hover:bg-white/40 dark:hover:bg-white/5'}`}>
                                            {tab.icon} {tab.label}
                                        </button>
                                    ))}
                                    <div className="w-px h-6 bg-slate-300 dark:bg-white/20 mx-1"></div>
                                    {[
                                        { id: 'checklist', icon: <IconList />, label: 'Checkliste' },
                                        { id: 'shotlist', icon: <IconCamera />, label: 'Shotlist' },
                                        { id: 'data', icon: <IconData />, label: 'Base Data' },
                                        { id: 'compare', icon: <IconCompare />, label: 'Vergleich' },
                                    ].map(tab => (
                                        <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-all ${activeTab === tab.id ? 'bg-white/80 dark:bg-white/20 shadow-[0_4px_12px_rgba(0,0,0,0.1)] dark:shadow-[0_4px_12px_rgba(0,0,0,0.3)] border border-slate-300/50 dark:border-white/20 text-slate-900 dark:text-white' : 'text-slate-500 dark:text-white/50 hover:text-slate-900 dark:hover:text-white hover:bg-white/40 dark:hover:bg-white/5 border border-transparent'}`}>
                                            {tab.icon} {tab.label}
                                        </button>
                                    ))}
                                </div>

                                {/* Tab Content */}
                                <div className="flex-1 overflow-auto p-8 pt-2 relative z-10">
                                    <div className="max-w-5xl mx-auto pb-20">

                                        {/* REPORT TAB */}
                                        {activeTab === 'report' && (
                                            <div className="space-y-6 animate-fade-in">
                                                <div className="glass-panel p-10 rounded-3xl shadow-xl dark:shadow-2xl relative overflow-hidden bg-white/90 dark:bg-black/60">
                                                    <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-brandOrange/10 dark:bg-brandOrange/5 blur-[120px] pointer-events-none rounded-full"></div>
                                                    <div className="flex justify-between items-start border-b border-slate-300/50 dark:border-white/10 pb-8 mb-8">
                                                        <div>
                                                            <div className="text-sm font-bold text-brandOrange uppercase tracking-widest mb-2">Executive Test Report</div>
                                                            <h2 className="text-4xl font-black text-slate-900 dark:text-white mb-2">{currentProject.title}</h2>
                                                            <div className="flex items-center gap-4 text-sm text-slate-600 dark:text-white/60">
                                                                <span className="flex items-center gap-1.5"><IconClock /> {formatTime(currentProject.timeSpent)}</span>
                                                                <span>&bull;</span>
                                                                <span className="uppercase tracking-widest">{categories.find(c => c.id === currentProject.category)?.name || currentProject.category}</span>
                                                            </div>
                                                        </div>
                                                        <div className="bg-slate-100 dark:bg-white/5 border border-slate-300/50 dark:border-white/10 px-8 py-4 rounded-2xl flex flex-col items-center shadow-inner">
                                                            <span className="text-xs font-bold text-slate-500 dark:text-white/50 uppercase tracking-widest mb-1">Gesamtnote</span>
                                                            <span className="text-5xl font-black text-slate-800 dark:text-white">{calculatedScore}</span>
                                                        </div>
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-10 mb-10">
                                                        <div>
                                                            <h4 className="text-lg font-bold text-green-600 dark:text-green-400 mb-4 flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-full bg-green-500"></div>Stärken (Pro)</h4>
                                                            <ul className="space-y-2">
                                                                {currentProject.data.pros.length > 0 ? currentProject.data.pros.map((p, i) => (
                                                                    <li key={i} className="text-sm text-slate-700 dark:text-white/80 bg-green-50 dark:bg-green-900/10 px-4 py-2.5 rounded-lg border border-green-200/50 dark:border-green-500/20">{p}</li>
                                                                )) : <li className="text-sm italic text-slate-400">Keine Stärken erfasst.</li>}
                                                            </ul>
                                                        </div>
                                                        <div>
                                                            <h4 className="text-lg font-bold text-red-600 dark:text-red-400 mb-4 flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-full bg-red-500"></div>Schwächen (Contra)</h4>
                                                            <ul className="space-y-2">
                                                                {currentProject.data.cons.length > 0 ? currentProject.data.cons.map((c, i) => (
                                                                    <li key={i} className="text-sm text-slate-700 dark:text-white/80 bg-red-50 dark:bg-red-900/10 px-4 py-2.5 rounded-lg border border-red-200/50 dark:border-red-500/20">{c}</li>
                                                                )) : <li className="text-sm italic text-slate-400">Keine Schwächen erfasst.</li>}
                                                            </ul>
                                                        </div>
